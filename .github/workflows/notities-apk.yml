name: Build Notities APK

# Bij elke push naar main bouwen we een release-APK en publiceren die als
# downloadbare GitHub Release, zodat de app zonder Play Store of lokale
# build-omgeving te installeren is.
on:
  push:
    branches: [main]
    paths:
      - 'notities/**'
      - '.github/workflows/notities-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Backend-URL waar de app tegen praat. Moet overeenkomen met waar
  # robberts-assistent-backend uiteindelijk draait.
  API_BASE_URL: https://robberts-assistent.vdzonsoftware.nl

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: notities
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Release-keystore klaarzetten
        working-directory: notities/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/robberts-assistent-release.keystore
          cat > keystore.properties <<EOF
          storeFile=robberts-assistent-release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEYSTORE_PASSWORD}
          EOF

      - name: Build release APK
        # --build-number: pubspec.yaml's vaste "+1" zou versionCode voor elke build op 1 houden,
        # waardoor Android een update altijd weigert (moet dan eerst verwijderd worden). run_number
        # loopt altijd op en reset nooit, dus dat is een geldige versionCode-bron per CI-build.
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --dart-define=API_BASE_URL="${{ env.API_BASE_URL }}" \
            --dart-define=GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}"

      - name: Publish APK as GitHub Release
        # Vaste tag (i.p.v. een oplopend buildnummer): elke build overschrijft dezelfde
        # release, zodat er één stabiele downloadlink blijft bestaan i.p.v. een steeds
        # groeiende, door-elkaar-gesorteerde lijst op de releases-pagina.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: notities-latest
          name: "Notities APK (laatste build)"
          body: |
            Automatisch gebouwde release-APK van de Notities-app — wordt bij elke build
            overschreven, dit is dus altijd de nieuwste versie (build ${{ github.run_number }},
            commit ${{ github.sha }}).
            Download `app-release.apk` hieronder en installeer op een Android-toestel
            (sta "installeren uit onbekende bron" toe).

            Backend: `${{ env.API_BASE_URL }}`
          files: notities/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
