name: Backend verification

on:
  pull_request:
    paths:
      - 'robberts-assistent-backend/**'
      - '.github/workflows/backend-verify.yml'
  push:
    branches: [main]
    paths:
      - 'robberts-assistent-backend/**'
      - '.github/workflows/backend-verify.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend-verification:
    name: robberts-assistent-backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: robberts-assistent-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Maven test
        run: mvn --batch-mode --no-transfer-progress test
