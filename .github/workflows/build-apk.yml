name: Build Wind APK

# Bij elke push naar main bouwen we een release-APK en publiceren die als
# downloadbare GitHub Release, zodat de app zonder Play Store of lokale
# build-omgeving te installeren is.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wind
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Build release APK
        run: flutter build apk --release

      - name: Publish APK as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: wind-build-${{ github.run_number }}
          name: Wind APK build ${{ github.run_number }}
          body: |
            Automatisch gebouwde release-APK van de Wind PoC-app.
            Download `app-release.apk` hieronder en installeer op een Android-toestel
            (sta "installeren uit onbekende bron" toe).
          files: wind/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
