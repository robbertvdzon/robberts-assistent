name: Build Groentetuin APK

# Bij elke push naar main bouwen we een release-APK en publiceren die als
# downloadbare GitHub Release, zodat de app zonder Play Store of lokale
# build-omgeving te installeren is.
on:
  push:
    branches: [main]
    paths:
      - 'groentetuin/**'
      - '.github/workflows/groentetuin-apk.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  # Backend-URL waar de app tegen praat (dezelfde assistent-backend).
  API_BASE_URL: https://robberts-assistent.vdzonsoftware.nl

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: groentetuin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test

      - name: Release-keystore klaarzetten
        working-directory: groentetuin/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > app/groentetuin-release.keystore
          cat > keystore.properties <<EOF
          storeFile=groentetuin-release.keystore
          storePassword=${ANDROID_KEYSTORE_PASSWORD}
          keyAlias=${ANDROID_KEY_ALIAS}
          keyPassword=${ANDROID_KEYSTORE_PASSWORD}
          EOF

      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }} \
            --dart-define=API_BASE_URL="${{ env.API_BASE_URL }}" \
            --dart-define=GOOGLE_CLIENT_ID="${{ vars.GOOGLE_CLIENT_ID }}"

      - name: Publish APK as GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: groentetuin-latest
          name: "Groentetuin APK (laatste build)"
          body: |
            Automatisch gebouwde release-APK van de Groentetuin-app — wordt bij elke
            build overschreven (build ${{ github.run_number }}, commit ${{ github.sha }}).
            Download `app-release.apk` hieronder en installeer op een Android-toestel
            (sta "installeren uit onbekende bron" toe).

            Backend: `${{ env.API_BASE_URL }}`
          files: groentetuin/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
