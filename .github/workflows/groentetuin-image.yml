name: Build groentetuin-frontend image

# Triggers:
#   * Push naar main   → bouw, push, en bump deploy/base/kustomization.yaml
#                         (ArgoCD synct prod naar de nieuwe SHA).
#   * Pull request      → bouw + push met de PR's HEAD-SHA als tag; de preview-
#                         ApplicationSet pint deze SHA, dus zonder image faalt de
#                         preview (ImagePullBackOff).
#
# API_BASE_URL wordt bewust NIET meegegeven: de frontend-nginx proxy't /api/
# same-origin naar robberts-assistent-backend:80 in dezelfde namespace.
on:
  push:
    branches: [main]
    paths:
      - 'groentetuin/**'
      - '.github/workflows/groentetuin-image.yml'
      - '.github/scripts/bump-images.sh'
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: groentetuin-image-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/robbertvdzon/groentetuin-frontend

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.sha.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Short SHA
        id: sha
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build timestamp
        id: ts
        run: echo "ts=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: groentetuin
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.sha.outputs.tag }}
            ${{ github.event_name == 'push' && format('{0}:main', env.IMAGE) || '' }}
          build-args: |
            BUILD_SHA=${{ steps.sha.outputs.tag }}
            BUILD_TIMESTAMP=${{ steps.ts.outputs.ts }}
            GOOGLE_CLIENT_ID=${{ vars.GOOGLE_CLIENT_ID }}
            SKIP_GOOGLE_AUTH=${{ github.event_name == 'pull_request' }}
          cache-from: type=gha,scope=groentetuin-frontend
          cache-to: type=gha,mode=max,scope=groentetuin-frontend

  bump-manifests:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump image tag in deploy/base
        run: |
          .github/scripts/bump-images.sh \
            deploy/base \
            "ci: bump groentetuin-frontend to ${{ needs.build.outputs.tag }}" \
            "ghcr.io/robbertvdzon/groentetuin-frontend=ghcr.io/robbertvdzon/groentetuin-frontend:${{ needs.build.outputs.tag }}"
