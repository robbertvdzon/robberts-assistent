---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: robberts-assistent-secrets
  namespace: robberts-assistent
spec:
  encryptedData:
    RA_ALLOWED_EMAILS: 
    RA_FIREBASE_CREDENTIALS_JSON: 
    RA_FIREBASE_DATABASE_ID: 
    RA_FIREBASE_PROJECT_ID: 
    RA_FIREBASE_STORAGE_BUCKET: 
    RA_GOOGLE_CLIENT_ID: 
    RA_GOOGLE_OAUTH_CLIENT_ID: 
    RA_GOOGLE_OAUTH_CLIENT_SECRET: 
    RA_GOOGLE_OAUTH_REFRESH_TOKEN: 
    RA_HUSQVARNA_APP_KEY: 
    RA_HUSQVARNA_APP_SECRET: 
    RA_OPENAI_API_KEY: 
    RA_PREVIEW_SKIP_GOOGLE_AUTH: 
    RA_REMEMBER_SECRET: 
    RA_TELEGRAM_BOT_TOKEN: 
    RA_TELEGRAM_CHAT_ID: 
  template:
    metadata:
      annotations:
        reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
        reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: ^(robberts-assistent-pr-.*)$
        reflector.v1.k8s.emberstack.com/reflection-auto-enabled: "true"
        reflector.v1.k8s.emberstack.com/reflection-auto-namespaces: ^(robberts-assistent-pr-.*)$
      name: robberts-assistent-secrets
      namespace: robberts-assistent
    type: Opaque
